set-option -g default-terminal "tmux-256color"
set-option -g terminal-overrides ",*:Tc"
set-option -g mouse on
set-option -g allow-rename off
set-option -g history-limit 100000
set-option -g status-position top
set-option -g mode-keys vi
set-window-option -g cursor-style block
set-option -g base-index 1
set-option -g prefix M-a
set-option -g renumber-windows off
set-option -g escape-time 0
set-option -g repeat-time 300
set-option -g focus-events on

unbind-key C-b
bind-key r source-file ~/.tmux.conf \; display-message 'reload ~/.tmux.conf'
bind-key c new-window -c "#{pane_current_path}"
bind-key C new-window \; new-window \; new-window \; new-window \; new-window \; new-window \; new-window \; new-window \; new-window
bind-key '"' split-window -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"

bind-key v copy-mode
bind-key p paste-buffer
bind-key -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-no-clear
bind-key -T copy-mode    WheelUpPane   send-keys -X clear-selection \; select-pane \; send-keys -N 5 -X scroll-up
bind-key -T copy-mode    WheelDownPane send-keys -X clear-selection \; select-pane \; send-keys -N 5 -X scroll-down
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear
bind-key -T copy-mode-vi WheelUpPane   send-keys -X clear-selection \; select-pane \; send-keys -N 5 -X scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X clear-selection \; select-pane \; send-keys -N 5 -X scroll-down

unbind-key L
bind-key H swap-pane -d -t '{left-of}'
bind-key J swap-pane -d -t '{down-of}'
bind-key K swap-pane -d -t '{up-of}'
bind-key L swap-pane -d -t '{right-of}'

bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9
bind-key -n M-0 select-window -t 10
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R
unbind-key Right
unbind-key Up
unbind-key Down


bind-key -n End send-keys C-e
bind-key -n Home send-keys C-a
bind-key s set-window-option synchronize-panes \; display-message "synchronize-panes: #{?pane_synchronized,on,off}"


set-option -g mode-style "fg=black,bg=skyblue"
set-option -g status-style "bg=colour236"
set-option -g status-justify "left"
set-option -g status-left-length "100"
set-option -g status "on"
set-option -g status-right-length "100"
set-option -g window-status-separator ""
set-option -g status-left ""
set-option -g status-right "#[fg=colour253] %Y/%m/%d %H:%M"
set-option -g window-status-format "#[fg=colour244] #I.#W "
set-option -g window-status-current-format "#[fg=colour253,bg=colour239] #I.#W "
set-option -g window-status-current-style nounderscore
set-option -g @resurrect-processes 'false'
set-option -g @resurrect-strategy-vim ''

#set-option -g @plugin 'seebi/tmux-colors-solarized'
#set-option -g @colors-solarized 'base16'
set-option -g @plugin 'tmux-plugins/tpm'
set-option -g @plugin 'tmux-plugins/tmux-resurrect'
set-option -g @plugin 'omerxx/tmux-floax'
set-option -g @floax-bind '-n M-p'
set-option -g @floax-text-color 'default'
set-option -g @floax-width '70%'
set-option -g @floax-height '70%'

run-shell '~/.tmux/plugins/tpm/tpm'
