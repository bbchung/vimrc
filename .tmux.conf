# ~/.tmux.conf — next-3.8 + Windows Terminal (WSL2)
# Only options that differ from stock next-3.8.
# Prefix: M-a  |  reload: prefix r
#
# WT: unbind Alt+a / Alt+p / Alt+hjkl / Alt+0-9 if they steal focus.
# WT: allow OSC 52 clipboard write if the option exists.

# ── Server ────────────────────────────────────────────────────────
set -s escape-time 0
set -s focus-events on
set -s extended-keys on
set -s set-clipboard on
set -s history-file "~/.tmux_history"

# Stock xterm* already has clipboard/ccolour/cstyle/focus/title.
# Reset user features on reload, then add RGB/undercurl/etc.
set -su terminal-features
set -as terminal-features ",xterm*:RGB:hyperlinks:usstyle:strikethrough:extkeys:sync:overline"
set -as terminal-features ",tmux*:RGB:hyperlinks:usstyle:strikethrough:extkeys:sync:overline"
set -as terminal-features ",alacritty*:RGB:hyperlinks:usstyle:strikethrough:extkeys:sync"
set -as terminal-features ",kitty*:RGB:hyperlinks:usstyle:strikethrough:extkeys:sync"
set -as terminal-features ",wezterm*:RGB:hyperlinks:usstyle:strikethrough:extkeys:sync"
set -as terminal-features ",foot*:RGB:hyperlinks:usstyle:strikethrough:extkeys:sync"

# WSL → Windows clipboard (copy-pipe* with no command uses this).
if-shell 'command -v win32yank.exe >/dev/null 2>&1' {
  set -s copy-command "win32yank.exe -i --crlf"
} {
  if-shell 'command -v clip.exe >/dev/null 2>&1' {
    set -s copy-command "clip.exe"
  }
}

# ── Session ───────────────────────────────────────────────────────
set -g prefix M-a
unbind-key C-b
bind-key M-a send-prefix

set -g status-keys emacs
set -g allow-passthrough all
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows off
set -g history-limit 100000
set -g aggressive-resize on
set -g display-time 2000
set -g display-panes-time 1500
set -g status-position top
set -g detach-on-destroy off
set -g repeat-time 300
set -g set-titles on
set -g pane-border-status top
set -g set-titles-string "#S · #W#{?pane_title, · #{pane_title},}"

# Default update-environment + WT/WSL vars (full replace, reload-safe).
set -g update-environment "DISPLAY KRB5CCNAME MSYSTEM SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WAYLAND_DISPLAY WINDOWID XAUTHORITY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP XDG_SESSION_TYPE WT_SESSION WT_PROFILE_ID COLORTERM TERM_PROGRAM WSL_INTEROP WSL_DISTRO_NAME"

# ── Window ────────────────────────────────────────────────────────

# ── Keybindings ───────────────────────────────────────────────────
bind-key r source-file ~/.tmux.conf \; display-message "reloaded ~/.tmux.conf"

bind-key c new-window -c "#{pane_current_path}"
bind-key C new-window -c "#{pane_current_path}" \;\
  new-window -c "#{pane_current_path}" \;\
  new-window -c "#{pane_current_path}" \;\
  new-window -c "#{pane_current_path}" \;\
  new-window -c "#{pane_current_path}" \;\
  new-window -c "#{pane_current_path}" \;\
  new-window -c "#{pane_current_path}" \;\
  new-window -c "#{pane_current_path}" \;\
  new-window -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key %  split-window -h -c "#{pane_current_path}"
bind-key |  split-window -h -c "#{pane_current_path}"
bind-key -  split-window -v -c "#{pane_current_path}"

bind-key v copy-mode
if-shell 'command -v win32yank.exe >/dev/null 2>&1' {
  bind-key p run-shell 'win32yank.exe -o --lf 2>/dev/null | tmux load-buffer -b wt - && tmux paste-buffer -b wt -p -d'
} {
  bind-key p paste-buffer -p
}
bind-key P choose-buffer

# mode-keys is vi by default on next-3.8 → only bind copy-mode-vi.
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear
bind-key -T copy-mode-vi WheelUpPane \
  send-keys -X clear-selection \; select-pane \; send-keys -N 2 -X scroll-up
# Leave copy-mode when mouse-scrolled to the live edge (latest output).
bind-key -T copy-mode-vi WheelDownPane \
  send-keys -X clear-selection \; select-pane \; send-keys -N 2 -X scroll-down \; \
  if -F "#{==:#{scroll_position},0}" "send-keys -X cancel"
bind-key -T copy-mode-vi DoubleClick1Pane \
  select-pane \; send-keys -X select-word \; send-keys -X copy-pipe-no-clear
bind-key -n DoubleClick1Pane \
  select-pane \; copy-mode -M \; send-keys -X select-word \; send-keys -X copy-pipe-no-clear

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel

unbind-key L
bind-key H swap-pane -d -t "{left-of}"
bind-key J swap-pane -d -t "{down-of}"
bind-key K swap-pane -d -t "{up-of}"
bind-key L swap-pane -d -t "{right-of}"

bind-key -r C-h resize-pane -L 5
bind-key -r C-j resize-pane -D 5
bind-key -r C-k resize-pane -U 5
bind-key -r C-l resize-pane -R 5

bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9
bind-key -n M-0 select-window -t 10

bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R

# Create floating pane: Alt+drag (stock is Ctrl+drag). Plain border drag still
# moves/resizes floating panes via MouseDrag1Border → resize-pane -M.
unbind-key -n C-MouseDrag1Pane
unbind-key -n C-MouseDrag1Empty
unbind-key -n M-MouseDrag1Pane
unbind-key -n M-MouseDrag1Border
bind-key -n M-MouseDrag1Pane  new-pane -M -c "#{pane_current_path}"
bind-key -n M-MouseDrag1Empty new-pane -M -c "#{pane_current_path}"

unbind-key Right
unbind-key Up
unbind-key Down
unbind-key Left

bind-key -n End  send-keys C-e
bind-key -n Home send-keys C-a

bind-key s set-window-option synchronize-panes \; \
  display-message "synchronize-panes: #{?pane_synchronized,on,off}"

bind-key Tab last-window
bind-key X kill-pane
bind-key S command-prompt -p "session name:" "new-session -A -s '%%'"
bind-key w choose-tree -Zw
bind-key g choose-tree -Zs

# ── Appearance (Catppuccin Mocha Modern Theme) ─────────────────────
# Catppuccin Mocha Palette:
# Base: #1e1e2e, Surface0: #313244, Surface1: #45475a, Text: #cdd6f4
# Subtext0: #a6adc8, Blue: #89b4fa, Lavender: #b4befe, Mauve: #cba6f7
# Yellow: #f9e2af, Peach: #fab387, Red: #f38ba8, Green: #a6e3a1

set -g mode-style "fg=#11111b,bg=#b4befe,bold"
set -g copy-mode-match-style "fg=#11111b,bg=#f9e2af"
set -g copy-mode-current-match-style "fg=#11111b,bg=#fab387,bold"

# Command prompt (:) and status messages
set -g message-style "fg=#cdd6f4,bg=#313244,bold,fill=#313244"
set -g message-command-style "fg=#89b4fa,bg=#313244,bold,fill=#313244"

# Pane borders: utf8 single line, pastel active border
set -g pane-border-lines single
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#b4befe"

# Controls (Nerd Font): color on active pane, muted grey on inactive
set -g pane-border-format "#{?pane_active,#[fg=#b4befe],#[fg=#6c7086]} #P · #{pane_title} #[default]#{?#{mouse},#[align=right]#[range=control|7]#{?pane_active,#[fg=#89b4fa],#[fg=#45475a]} #{?#{pane_floating_flag},󰖲,󰕰} #[norange]#[range=control|8]#{?pane_active,#[fg=#f9e2af],#[fg=#45475a]} #{?#{window_zoomed_flag},󰊔,󰊓} #[norange]#[range=control|9]#{?pane_active,#[fg=#f38ba8],#[fg=#45475a]} 󰅖 #[norange],}"
set -g popup-border-style "fg=#89b4fa"
set -g popup-border-lines rounded

# Status Bar Configuration
set -g status-interval 2
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 50
set -g status-right-length 100
set -g window-status-separator " "

# Status Left: Session Badge (Rounded Pill)
set -g status-left "#[fg=#89b4fa,bg=#1e1e2e]#[fg=#11111b,bg=#89b4fa,bold] #S #[fg=#89b4fa,bg=#1e1e2e] "

# Status Right: Path + Date + Time Badges
set -g status-right "#[fg=#313244,bg=#1e1e2e]#[fg=#89b4fa,bg=#313244]󰋜 #{b:pane_current_path} #[fg=#313244,bg=#1e1e2e] #[fg=#cba6f7,bg=#1e1e2e]#[fg=#11111b,bg=#cba6f7,bold]󰃭 %Y-%m-%d #[fg=#cba6f7,bg=#45475a]#[fg=#cdd6f4,bg=#45475a,bold] 󱑏 %H:%M #[fg=#45475a,bg=#1e1e2e]"

# Window Status Badges
set -g window-status-format "#[fg=#313244,bg=#1e1e2e]#[fg=#a6adc8,bg=#313244]#I #W#[fg=#313244,bg=#1e1e2e]"
set -g window-status-current-format "#[fg=#b4befe,bg=#1e1e2e]#[fg=#11111b,bg=#b4befe,bold]#I#[fg=#cdd6f4,bg=#45475a,bold] #W #{?window_zoomed_flag,󰊔 ,}#[fg=#45475a,bg=#1e1e2e]"
set -g window-status-current-style "nounderscore"
set -g window-status-activity-style "fg=#f9e2af,bold"

# ── Plugins (TPM) ─────────────────────────────────────────────────
set -g @resurrect-processes "false"
set -g @resurrect-strategy-vim "session"
set -g @resurrect-strategy-nvim "session"
set -g @resurrect-capture-pane-contents "on"

set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-resurrect"
 

run-shell "~/.tmux/plugins/tpm/tpm"
